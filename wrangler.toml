name = "spinapp-web"
main = "worker/index.js"
compatibility_date = "2024-06-18"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Bind a KV namespace named DOWNLOADS in the Cloudflare dashboard
# (Settings → Bindings → KV namespace) to persist the counter across requests.
