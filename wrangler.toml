name = "spinapp-web"
main = "worker/index.js"
compatibility_date = "2024-06-18"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "COUNTER"
class_name = "DownloadCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DownloadCounter"]
