[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/download-count"
  to = "/.netlify/functions/download-count"
  status = 200

[[redirects]]
  from = "/api/track-download"
  to = "/.netlify/functions/download-count"
  status = 200

[[redirects]]
  from = "/download"
  to = "/.netlify/functions/track-download"
  status = 200

# Live llms.txt from Morgon (update URL when tunnel rotates)
[[redirects]]
  from = "/llms.txt"
  to = "https://tunes-appropriate-dispatched-exports.trycloudflare.com/presence/spinapp/llms.txt"
  status = 200
  force = true
