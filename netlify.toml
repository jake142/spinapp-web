[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/download-count"
  to = "/.netlify/functions/download-count"
  status = 200

[[redirects]]
  from = "/api/track-download"
  to = "/.netlify/functions/download-count"
  status = 200

[[redirects]]
  from = "/download"
  to = "/.netlify/functions/track-download"
  status = 200

[[redirects]]
  from = "/llms.txt"
  to = "https://federation-mount-cookies-hearings.trycloudflare.com/presence/spinapp/llms.txt"
  status = 200
  force = true

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache, must-revalidate"
